<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mon Caviste">
<meta name="theme-color" content="#3d0a00">
<title>🍷 Mon Caviste</title>
<link rel="apple-touch-icon" href="icon.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body, #root { height: 100%; }
  body { background: #1a0a00; font-family: Georgia, serif; color: #f5e6c8; overscroll-behavior: none; }
  input, button { font-family: Georgia, serif; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #1a0a00; }
  ::-webkit-scrollbar-thumb { background: #5a2a00; border-radius: 2px; }
  input { -webkit-appearance: none; border-radius: 8px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const PIN = “1234”; // Change this PIN
const WINE_COLORS = { rouge:“🔴”, blanc:“⚪”, rosé:“🌸”, champagne:“🥂”, autre:“🍾” };

// Bottle colors - horizontal lying bottles viewed from front
const BOTTLE_COLORS = {
rouge:     { body:”#6b1010”, label:”#c4916a”, shine:”#8b2020”, cap:”#4a0a0a” },
blanc:     { body:”#8a9a40”, label:”#f5e6c8”, shine:”#aaba60”, cap:”#606a20” },
rosé:      { body:”#c46878”, label:”#f5dde2”, shine:”#d888a0”, cap:”#8a3848” },
champagne: { body:”#b89840”, label:”#f5e6c8”, shine:”#d8b860”, cap:”#786010” },
autre:     { body:”#5a5a8a”, label:”#e8e8f5”, shine:”#7a7aaa”, cap:”#3a3a6a” },
};

const SECTIONS = [
{ id:“L”, label:“Gauche”, hauteur:“124cm”, rangees:8,  cols:8 },
{ id:“R”, label:“Droite”,  hauteur:“179cm”, rangees:16, cols:8 },
];

const GS_URL = “https://script.google.com/macros/s/AKfycbwJa9sFeyITw0cYhozI2eN5RRZyILs-dzLNUEt5vx-fqyjPDe2i4bBcTGCxKdKNN3AC/exec”;

async function gsGet() {
const res = await fetch(GS_URL, { redirect:“follow” });
return await res.json();
}
async function gsSet(wines, positions) {
await fetch(GS_URL, { method:“POST”, redirect:“follow”, body: JSON.stringify({ wines, positions }) });
}

// ── Horizontal Bottle SVG ──────────────────────────────
function Bottle({ wine, selected, onClick, empty, assignMode }) {
const W = 34, H = 16;
if (empty) {
return (
<div onClick={onClick} style={{
width:W, height:H, borderRadius:3, cursor:“pointer”,
background: assignMode ? “#2a1800” : “#180c00”,
border: selected ? “2px solid #e8a060” : “1px solid #3a2000”,
display:“flex”, alignItems:“center”, justifyContent:“center”,
flexShrink:0
}}>
{assignMode && <span style={{color:”#6a4a00”,fontSize:10}}>+</span>}
</div>
);
}
const c = BOTTLE_COLORS[wine?.type] || BOTTLE_COLORS.autre;
return (
<div onClick={onClick} title={wine ? `${wine.nom} ${wine.millesime}` : “”}
style={{
width:W, height:H, flexShrink:0, cursor:“pointer”, position:“relative”,
border: selected ? “2px solid #e8a060” : “1px solid rgba(255,255,255,0.1)”,
borderRadius:3, overflow:“hidden”,
transform: selected ? “scale(1.08)” : “scale(1)”, transition:“transform 0.1s”
}}>
{/* Bottle body */}
<div style={{position:“absolute”,inset:0,background:c.body}}/>
{/* Neck left */}
<div style={{position:“absolute”,left:0,top:“20%”,width:“12%”,height:“60%”,background:c.body,borderRadius:“2px 0 0 2px”}}/>
{/* Cap */}
<div style={{position:“absolute”,left:0,top:“25%”,width:“8%”,height:“50%”,background:c.cap,borderRadius:“2px 0 0 2px”}}/>
{/* Shine */}
<div style={{position:“absolute”,top:“15%”,left:“15%”,width:“60%”,height:“30%”,background:c.shine,borderRadius:2,opacity:0.5}}/>
{/* Label */}
<div style={{position:“absolute”,top:“25%”,left:“20%”,width:“55%”,height:“50%”,background:c.label,borderRadius:1,opacity:0.7}}/>
{/* Bottom */}
<div style={{position:“absolute”,right:0,top:“10%”,width:“5%”,height:“80%”,background:c.cap,opacity:0.5}}/>
</div>
);
}

function App() {
const [unlocked, setUnlocked]   = useState(() => sessionStorage.getItem(“cave_pin”) === PIN);
const [pinInput, setPinInput]   = useState(””);
const [pinError, setPinError]   = useState(false);

const [wines, setWines]         = useState([]);
const [positions, setPositions] = useState({});
const [ready, setReady]         = useState(false);
const [syncing, setSyncing]     = useState(false);
const [lastSync, setLastSync]   = useState(null);
const [view, setView]           = useState(“map”);
const [messages, setMessages]   = useState([
{ role:“assistant”, content:“Bonjour ! Je suis votre sommelier personnel 🍷\n\nPosez-moi vos questions sur les accords mets-vins, le service ou quand ouvrir vos bouteilles.” }
]);
const [input, setInput]         = useState(””);
const [loading, setLoading]     = useState(false);
const [newWine, setNewWine]     = useState({ nom:””, appellation:””, millesime:””, quantite:1, type:“rouge” });
const [editId, setEditId]       = useState(null);
const [toast, setToast]         = useState(null);
const [assignMode, setAssignMode] = useState(null);
const [selectedCell, setSelectedCell] = useState(null);
const messagesEnd = useRef(null);
const saveTimer   = useRef(null);
const winesRef    = useRef(wines);
const posRef      = useRef(positions);

useEffect(() => { winesRef.current = wines; }, [wines]);
useEffect(() => { posRef.current = positions; }, [positions]);

useEffect(() => {
if (!unlocked) return;
(async () => {
try {
setSyncing(true);
const data = await gsGet();
setWines(data.wines || []);
setPositions(data.positions || {});
setLastSync(new Date());
} catch(e) { showToast(“⚠️ Impossible de charger la cave”, “#7a5a00”); }
setSyncing(false);
setReady(true);
})();
}, [unlocked]);

useEffect(() => { if (messagesEnd.current) messagesEnd.current.scrollIntoView({ behavior:“smooth” }); }, [messages, loading]);

const showToast = (msg, color=”#3a6a3a”) => { setToast({msg,color}); setTimeout(()=>setToast(null),2800); };

const scheduleSave = (w, p) => {
if (saveTimer.current) clearTimeout(saveTimer.current);
saveTimer.current = setTimeout(async () => {
try { setSyncing(true); await gsSet(w, p); setLastSync(new Date()); }
catch(e) { showToast(“⚠️ Erreur sauvegarde”,”#7a5a00”); }
setSyncing(false);
}, 1200);
};

const updateWines     = (u) => { setWines(u);     scheduleSave(u, posRef.current); };
const updatePositions = (u) => { setPositions(u); scheduleSave(winesRef.current, u); };

const winePositionMap = {};
Object.entries(positions).forEach(([cell,wid]) => {
if (!winePositionMap[wid]) winePositionMap[wid] = [];
winePositionMap[wid].push(cell);
});

const handleCellClick = (ck) => {
if (assignMode) {
const p = {…positions};
if (p[ck] === assignMode) delete p[ck]; else p[ck] = assignMode;
updatePositions(p);
} else {
setSelectedCell(ck === selectedCell ? null : ck);
}
};

const sendMessage = async () => {
if (!input.trim() || loading) return;
const userMsg = input.trim(); setInput(””);
setMessages(prev => […prev, { role:“user”, content:userMsg }]);
setLoading(true);
const caveCtx = wines.length === 0 ? “La cave est vide.” :
“Cave :\n” + wines.map(w => {
const cells = winePositionMap[w.id] || [];
return `- ${WINE_COLORS[w.type]} ${w.nom} (${w.appellation}), ${w.millesime}, ${w.quantite} btl${cells.length?" pos:"+cells.join(","):""}`;
}).join(”\n”);
const history = messages.map(m=>({role:m.role,content:m.content}));
history.push({role:“user”,content:userMsg});
try {
const res = await fetch(“https://api.anthropic.com/v1/messages”, {
method:“POST”, headers:{“Content-Type”:“application/json”},
body: JSON.stringify({ model:“claude-sonnet-4-20250514”, max_tokens:1000,
system:`Tu es un sommelier expert. Français, élégant et précis.\n${caveCtx}\nConseille accords, garde, service. Ne jamais inventer de vins absents.`,
messages: history })
});
const data = await res.json();
const reply = (data.content&&data.content.find(b=>b.type===“text”)||{}).text||“Désolé, erreur.”;
setMessages(prev=>[…prev,{role:“assistant”,content:reply}]);
} catch(e) { setMessages(prev=>[…prev,{role:“assistant”,content:“Erreur de connexion.”}]); }
setLoading(false);
};

const addOrUpdateWine = () => {
if (!newWine.nom.trim()) return;
let updated;
if (editId !== null) {
updated = wines.map(w=>w.id===editId?{…newWine,id:editId}:w);
setEditId(null); showToast(“✅ Vin modifié”);
} else {
updated = […wines,{…newWine,id:Date.now()}];
showToast(“✅ Vin ajouté”);
}
updateWines(updated);
setNewWine({nom:””,appellation:””,millesime:””,quantite:1,type:“rouge”});
setView(“cellar”);
};

const deleteWine = (id) => {
const newW = wines.filter(w=>w.id!==id);
const newP = {…positions};
Object.keys(newP).forEach(k=>{ if(newP[k]===id) delete newP[k]; });
setWines(newW); setPositions(newP); scheduleSave(newW, newP);
showToast(“🗑️ Supprimé”,”#6a2a2a”);
};

const startEdit = (w) => {
setNewWine({nom:w.nom,appellation:w.appellation,millesime:w.millesime,quantite:w.quantite,type:w.type});
setEditId(w.id); setView(“add”);
};

const manualSync = async () => {
try {
setSyncing(true);
const data = await gsGet();
setWines(data.wines||[]); setPositions(data.positions||{});
setLastSync(new Date()); showToast(“✅ Cave synchronisée !”);
} catch(e) { showToast(“⚠️ Erreur sync”,”#7a5a00”); }
setSyncing(false);
};

const totalCells    = SECTIONS.reduce((s,sec)=>s+sec.rangees*sec.cols, 0);
const occupiedCells = Object.keys(positions).length;
const totalBottles  = wines.reduce((s,w)=>s+Number(w.quantite),0);

// ── PIN SCREEN ─────────────────────────────────────
if (!unlocked) return (
<div style={{display:“flex”,flexDirection:“column”,alignItems:“center”,justifyContent:“center”,height:“100vh”,background:”#1a0a00”,gap:20,padding:30}}>
<div style={{fontSize:48}}>🍷</div>
<div style={{fontSize:20,fontWeight:“bold”,letterSpacing:1}}>Mon Caviste</div>
<div style={{fontSize:13,color:”#9a6a4a”,marginTop:4}}>Entrez votre code PIN</div>
<input
type=“password” inputMode=“numeric” maxLength={6}
value={pinInput} onChange={e=>setPinInput(e.target.value)}
onKeyDown={e=>{ if(e.key===“Enter”){ if(pinInput===PIN){sessionStorage.setItem(“cave_pin”,PIN);setUnlocked(true);}else{setPinError(true);setPinInput(””);setTimeout(()=>setPinError(false),1500);} }}}
placeholder=”• • • •”
style={{
width:160, padding:“12px”, textAlign:“center”, fontSize:22, letterSpacing:8,
background:”#2a1500”, border:`1px solid ${pinError?"#c47a6a":"#5a2a00"}`,
color:”#f5e6c8”, borderRadius:10, outline:“none”
}}
autoFocus
/>
{pinError && <div style={{color:”#c47a6a”,fontSize:13}}>Code incorrect</div>}
<button onClick={()=>{ if(pinInput===PIN){sessionStorage.setItem(“cave_pin”,PIN);setUnlocked(true);}else{setPinError(true);setPinInput(””);setTimeout(()=>setPinError(false),1500);}}}
style={{padding:“10px 30px”,borderRadius:10,background:”#8b2a00”,border:“none”,color:”#f5e6c8”,fontSize:15,cursor:“pointer”}}>
Entrer
</button>
</div>
);

if (!ready) return (
<div style={{display:“flex”,flexDirection:“column”,alignItems:“center”,justifyContent:“center”,height:“100vh”,color:”#c4916a”,fontSize:16,background:”#1a0a00”,gap:12}}>
<div style={{fontSize:40}}>🍷</div>
<div>Chargement de votre cave…</div>
<div style={{fontSize:11,color:”#5a3a00”}}>Connexion à Google Sheets…</div>
</div>
);

// ── PLAN VIEW ──────────────────────────────────────
const renderSection = (sec) => (
<div key={sec.id} style={{marginBottom:24}}>
<div style={{fontSize:12,color:”#e8a060”,fontWeight:“bold”,marginBottom:6}}>
{sec.label} — {sec.hauteur}
<span style={{fontSize:10,color:”#9a6a4a”,fontWeight:“normal”,marginLeft:8}}>
{sec.rangees}×{sec.cols} = {sec.rangees*sec.cols} positions
</span>
</div>
{/* Wood frame */}
<div style={{background:”#b08040”,borderRadius:6,padding:“5px 6px 6px”,border:“3px solid #7a5018”,boxShadow:“inset 0 2px 8px #0005,2px 4px 10px #0006”,position:“relative”,display:“inline-block”}}>
<div style={{position:“absolute”,left:0,top:0,bottom:0,width:5,background:”#7a5018”,borderRadius:“4px 0 0 4px”}}/>
<div style={{position:“absolute”,right:0,top:0,bottom:0,width:5,background:”#7a5018”,borderRadius:“0 4px 4px 0”}}/>
<div style={{marginLeft:4,marginRight:4}}>
{Array.from({length:sec.rangees}).map((_,row)=>(
<div key={row}>
<div style={{height:4,background:“linear-gradient(to bottom,#9a6028,#7a5018)”,borderRadius:2,marginBottom:2}}/>
<div style={{display:“flex”,gap:3,marginBottom:2,alignItems:“center”}}>
{/* Row number */}
<div style={{width:16,flexShrink:0,textAlign:“right”,paddingRight:2}}>
<span style={{fontSize:8,color:”#6a4010”,fontWeight:“bold”}}>{row+1}</span>
</div>
{/* Bottles */}
{Array.from({length:sec.cols}).map((_,col)=>{
const ck=`${sec.id}-${row}-${col}`;
const wid=positions[ck];
const wine=wid?wines.find(w=>w.id===wid):null;
return (
<Bottle key={col} wine={wine} selected={selectedCell===ck}
onClick={()=>handleCellClick(ck)}
empty={!wine} assignMode={assignMode}/>
);
})}
</div>
</div>
))}
<div style={{height:4,background:“linear-gradient(to bottom,#9a6028,#7a5018)”,borderRadius:2}}/>
</div>
</div>
{/* Col numbers */}
<div style={{display:“flex”,marginTop:2,paddingLeft:20}}>
{Array.from({length:sec.cols}).map((_,c)=>(
<div key={c} style={{width:34,flexShrink:0,textAlign:“center”,fontSize:8,color:”#5a3800”}}>{c+1}</div>
))}
</div>
</div>
);

const renderMap = () => (
<div style={{flex:1,overflowY:“auto”,padding:“10px 12px”}}>
<div style={{display:“flex”,alignItems:“center”,marginBottom:10}}>
<span style={{fontSize:10,color:”#9a6a4a”}}>{occupiedCells}/{totalCells} positions · {totalCells-occupiedCells} libres</span>
{assignMode && (
<button onClick={()=>setAssignMode(null)}
style={{marginLeft:“auto”,padding:“4px 12px”,borderRadius:11,background:”#e8a060”,border:“none”,color:”#1a0a00”,cursor:“pointer”,fontSize:11,fontWeight:“bold”}}>
✓ Fin placement
</button>
)}
</div>

      <div style={{fontSize:13,color:"#e8a060",marginBottom:2}}>
        Placement : <strong>{(wines.find(w=>w.id===assignMode)||{}).nom}</strong>
      </div>
      <div style={{fontSize:11,color:"#9a6a4a"}}>{(winePositionMap[assignMode]||[]).length} position(s) · Cliquez les cases</div>

      <div key={t} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"#9a6a4a"}}>
        <div style={{width:18,height:9,background:c.body,borderRadius:2,border:"1px solid rgba(255,255,255,0.1)"}}/>

      </div>
    ))}

      <div style={{width:18,height:9,background:"#180c00",border:"1px solid #3a2000",borderRadius:2}}/>
      vide
    </div>
  </div>
</div>

);

// ── SETTINGS ───────────────────────────────────────
const renderSettings = () => (
<div style={{flex:1,overflowY:“auto”,padding:18}}>
<div style={{fontSize:15,fontWeight:“bold”,marginBottom:18}}>⚙️ Réglages</div>
<div style={{background:”#2a1500”,border:“1px solid #5a2a00”,borderRadius:10,padding:14,marginBottom:14}}>
<div style={{fontSize:13,color:”#e8a060”,fontWeight:“bold”,marginBottom:6}}>☁️ Google Sheets</div>
<div style={{fontSize:11,color:”#9a6a4a”,lineHeight:1.6,marginBottom:10}}>
Cave synchronisée automatiquement sur tous vos appareils.
{lastSync && <div style={{marginTop:4,color:”#6a8a6a”}}>Dernière sync : {lastSync.toLocaleTimeString()}</div>}
</div>
<button onClick={manualSync} disabled={syncing}
style={{width:“100%”,padding:“10px”,borderRadius:8,background:syncing?”#3a1500”:”#2a4a2a”,border:“1px solid #3a6a3a”,color:syncing?”#9a6a4a”:”#8aaa8a”,cursor:syncing?“not-allowed”:“pointer”,fontSize:13}}>
{syncing?“⏳ Synchronisation…”:“🔄 Synchroniser maintenant”}
</button>
</div>
<div style={{background:”#2a1500”,border:“1px solid #5a2a00”,borderRadius:10,padding:14,marginBottom:14}}>
<div style={{fontSize:13,color:”#e8a060”,fontWeight:“bold”,marginBottom:6}}>🔒 Code PIN</div>
<div style={{fontSize:11,color:”#9a6a4a”,lineHeight:1.6}}>
Code actuel : <strong style={{color:”#c4916a”}}>****</strong><br/>
Pour changer le PIN, modifiez la ligne <code style={{color:”#e8a060”}}>const PIN = “1234”</code> dans le fichier index.html sur GitHub.
</div>
</div>
<div style={{background:”#2a1500”,border:“1px solid #5a2a00”,borderRadius:10,padding:14}}>
<div style={{fontSize:13,color:”#e8a060”,fontWeight:“bold”,marginBottom:6}}>📲 Installer comme app</div>
<div style={{fontSize:11,color:”#9a6a4a”,lineHeight:1.7}}>
<strong style={{color:”#c4916a”}}>iPhone (Safari) :</strong><br/>
Partager → “Sur l’écran d’accueil”<br/><br/>
<strong style={{color:”#c4916a”}}>PC (Chrome) :</strong><br/>
Icône ⊕ dans la barre d’adresse → “Installer”
</div>
</div>
</div>
);

// ── MAIN RENDER ────────────────────────────────────
return (
