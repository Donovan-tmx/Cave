<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mon Caviste">
<meta name="theme-color" content="#3d0a00">
<title>🍷 Mon Caviste</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body, #root { height: 100%; }
  body { background: #1a0a00; font-family: Georgia, serif; color: #f5e6c8; overscroll-behavior: none; }
  input, button { font-family: Georgia, serif; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #1a0a00; }
  ::-webkit-scrollbar-thumb { background: #5a2a00; border-radius: 2px; }
  input { -webkit-appearance: none; border-radius: 8px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const WINE_COLORS = { rouge:"🔴", blanc:"⚪", rosé:"🌸", champagne:"🥂", autre:"🍾" };
const TYPE_COLOR  = { rouge:"#8b1a1a", blanc:"#b8a060", rosé:"#c46878", champagne:"#b89840", autre:"#6a6a8a" };

const SECTIONS = [
  { id:"L", label:"Gauche", hauteur:"124cm", rangees:8,  cols:8 },
  { id:"R", label:"Droite",  hauteur:"179cm", rangees:16, cols:8 },
];

const GS_URL = "https://script.google.com/macros/s/AKfycbwJa9sFeyITw0cYhozI2eN5RRZyILs-dzLNUEt5vx-fqyjPDe2i4bBcTGCxKdKNN3AC/exec";

async function gsGet() {
  const res = await fetch(GS_URL, { redirect: "follow" });
  return await res.json();
}

async function gsSet(wines, positions) {
  await fetch(GS_URL, {
    method: "POST",
    redirect: "follow",
    body: JSON.stringify({ wines, positions }),
  });
}

function App() {
  const [wines, setWines]         = useState([]);
  const [positions, setPositions] = useState({});
  const [ready, setReady]         = useState(false);
  const [syncing, setSyncing]     = useState(false);
  const [lastSync, setLastSync]   = useState(null);
  const [view, setView]           = useState("map");
  const [messages, setMessages]   = useState([
    { role:"assistant", content:"Bonjour ! Je suis votre sommelier personnel 🍷\n\nPosez-moi vos questions sur les accords mets-vins, le service ou quand ouvrir vos bouteilles." }
  ]);
  const [input, setInput]       = useState("");
  const [loading, setLoading]   = useState(false);
  const [newWine, setNewWine]   = useState({ nom:"", appellation:"", millesime:"", quantite:1, type:"rouge" });
  const [editId, setEditId]     = useState(null);
  const [toast, setToast]       = useState(null);
  const [assignMode, setAssignMode]     = useState(null);
  const [selectedCell, setSelectedCell] = useState(null);
  const messagesEnd = useRef(null);
  const saveTimer   = useRef(null);
  const winesRef    = useRef(wines);
  const positionsRef = useRef(positions);

  useEffect(() => { winesRef.current = wines; }, [wines]);
  useEffect(() => { positionsRef.current = positions; }, [positions]);

  useEffect(() => {
    (async () => {
      try {
        setSyncing(true);
        const data = await gsGet();
        setWines(data.wines || []);
        setPositions(data.positions || {});
        setLastSync(new Date());
      } catch(e) {
        showToast("⚠️ Impossible de charger la cave", "#7a5a00");
      }
      setSyncing(false);
      setReady(true);
    })();
  }, []);

  useEffect(() => { if (messagesEnd.current) messagesEnd.current.scrollIntoView({ behavior:"smooth" }); }, [messages, loading]);

  const showToast = (msg, color="#3a6a3a") => { setToast({msg,color}); setTimeout(()=>setToast(null),2800); };

  const scheduleSave = (w, p) => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try {
        setSyncing(true);
        await gsSet(w, p);
        setLastSync(new Date());
      } catch(e) {
        showToast("⚠️ Erreur de sauvegarde", "#7a5a00");
      }
      setSyncing(false);
    }, 1200);
  };

  const updateWines     = (u) => { setWines(u);     scheduleSave(u, positionsRef.current); };
  const updatePositions = (u) => { setPositions(u); scheduleSave(winesRef.current, u); };

  const winePositionMap = {};
  Object.entries(positions).forEach(([cell,wid]) => {
    if (!winePositionMap[wid]) winePositionMap[wid] = [];
    winePositionMap[wid].push(cell);
  });

  const handleCellClick = (ck) => {
    if (assignMode) {
      const p = {...positions};
      if (p[ck] === assignMode) delete p[ck]; else p[ck] = assignMode;
      updatePositions(p);
    } else {
      setSelectedCell(ck === selectedCell ? null : ck);
    }
  };

  const sendMessage = async () => {
    if (!input.trim() || loading) return;
    const userMsg = input.trim();
    setInput("");
    setMessages(prev => [...prev, { role:"user", content:userMsg }]);
    setLoading(true);
    const caveCtx = wines.length === 0 ? "La cave est vide." :
      "Cave :\n" + wines.map(w => {
        const cells = winePositionMap[w.id] || [];
        return `- ${WINE_COLORS[w.type]} ${w.nom} (${w.appellation}), ${w.millesime}, ${w.quantite} btl${cells.length?" pos:"+cells.join(","):""}`;
      }).join("\n");
    const history = messages.map(m=>({role:m.role,content:m.content}));
    history.push({role:"user",content:userMsg});
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:1000,
          system:`Tu es un sommelier expert. Français uniquement, élégant et précis.\n${caveCtx}\nConseille accords, garde, service. Ne jamais inventer de vins absents.`,
          messages: history
        })
      });
      const data = await res.json();
      const reply = (data.content&&data.content.find(b=>b.type==="text")||{}).text||"Désolé, erreur.";
      setMessages(prev=>[...prev,{role:"assistant",content:reply}]);
    } catch(e) {
      setMessages(prev=>[...prev,{role:"assistant",content:"Erreur de connexion."}]);
    }
    setLoading(false);
  };

  const addOrUpdateWine = () => {
    if (!newWine.nom.trim()) return;
    let updated;
    if (editId !== null) {
      updated = wines.map(w=>w.id===editId?{...newWine,id:editId}:w);
      setEditId(null); showToast("✅ Vin modifié");
    } else {
      updated = [...wines,{...newWine,id:Date.now()}];
      showToast("✅ Vin ajouté");
    }
    updateWines(updated);
    setNewWine({nom:"",appellation:"",millesime:"",quantite:1,type:"rouge"});
    setView("cellar");
  };

  const deleteWine = (id) => {
    const newW = wines.filter(w=>w.id!==id);
    const newP = {...positions};
    Object.keys(newP).forEach(k=>{ if(newP[k]===id) delete newP[k]; });
    setWines(newW); setPositions(newP);
    scheduleSave(newW, newP);
    showToast("🗑️ Supprimé","#6a2a2a");
  };

  const startEdit = (w) => {
    setNewWine({nom:w.nom,appellation:w.appellation,millesime:w.millesime,quantite:w.quantite,type:w.type});
    setEditId(w.id); setView("add");
  };

  const manualSync = async () => {
    try {
      setSyncing(true);
      const data = await gsGet();
      setWines(data.wines || []);
      setPositions(data.positions || {});
      setLastSync(new Date());
      showToast("✅ Cave synchronisée !");
    } catch(e) {
      showToast("⚠️ Erreur de synchronisation", "#7a5a00");
    }
    setSyncing(false);
  };

  const totalCells    = SECTIONS.reduce((s,sec)=>s+sec.rangees*sec.cols, 0);
  const occupiedCells = Object.keys(positions).length;
  const totalBottles  = wines.reduce((s,w)=>s+Number(w.quantite),0);
  const CELL = 28;

  if (!ready) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",color:"#c4916a",fontSize:16,background:"#1a0a00",fontFamily:"Georgia,serif",gap:12}}>
      <div style={{fontSize:40}}>🍷</div>
      <div>Chargement de votre cave…</div>
      <div style={{fontSize:11,color:"#5a3a00"}}>Connexion à Google Sheets…</div>
    </div>
  );

  const renderSection = (sec) => (
    <div key={sec.id} style={{marginBottom:24}}>
      <div style={{fontSize:12,color:"#e8a060",fontWeight:"bold",marginBottom:6}}>
        {sec.label} — {sec.hauteur}
        <span style={{fontSize:10,color:"#9a6a4a",fontWeight:"normal",marginLeft:8}}>
          {sec.rangees}×{sec.cols} = {sec.rangees*sec.cols} positions
        </span>
      </div>
      <div style={{background:"#b08040",borderRadius:6,padding:"5px 6px 6px",border:"3px solid #7a5018",boxShadow:"inset 0 2px 8px #0005,2px 4px 10px #0006",position:"relative",display:"inline-block"}}>
        <div style={{position:"absolute",left:0,top:0,bottom:0,width:5,background:"#7a5018",borderRadius:"4px 0 0 4px"}}/>
        <div style={{position:"absolute",right:0,top:0,bottom:0,width:5,background:"#7a5018",borderRadius:"0 4px 4px 0"}}/>
        <div style={{marginLeft:4,marginRight:4}}>
          {Array.from({length:sec.rangees}).map((_,row)=>(
            <div key={row}>
              <div style={{height:4,background:"linear-gradient(to bottom,#9a6028,#7a5018)",borderRadius:2,marginBottom:2}}/>
              <div style={{display:"flex",gap:2,marginBottom:2,alignItems:"center"}}>
                <div style={{width:16,flexShrink:0,textAlign:"right",paddingRight:3}}>
                  <span style={{fontSize:8,color:"#6a4010",fontWeight:"bold"}}>{row+1}</span>
                </div>
                {Array.from({length:sec.cols}).map((_,col)=>{
                  const ck=`${sec.id}-${row}-${col}`;
                  const wid=positions[ck];
                  const wine=wid?wines.find(w=>w.id===wid):null;
                  const isSel=selectedCell===ck;
                  const bg=wine?(TYPE_COLOR[wine.type]||"#5a5a7a"):(assignMode?"#2a1800":"#180c00");
                  return (
                    <div key={col} onClick={()=>handleCellClick(ck)}
                      title={wine?`${wine.nom} ${wine.millesime}`:"Vide"}
                      style={{
                        width:CELL,height:Math.round(CELL*1.6),flexShrink:0,
                        borderRadius:3,background:bg,
                        border:isSel?"2px solid #e8a060":wine?"1px solid rgba(255,255,255,0.18)":"1px solid #3a2000",
                        cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
                        transform:isSel?"scale(1.08)":"scale(1)",transition:"transform 0.1s",
                        boxShadow:wine?"inset 0 1px 4px #0005":"none",
                        position:"relative",overflow:"hidden"
                      }}>
                      {wine && (
                        <div style={{width:"40%",height:"74%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end"}}>
                          <div style={{width:"30%",height:"18%",background:"rgba(255,255,255,0.25)",borderRadius:"2px 2px 0 0"}}/>
                          <div style={{width:"100%",height:"76%",background:"rgba(255,255,255,0.15)",borderRadius:"2px",position:"relative"}}>
                            <div style={{position:"absolute",left:"20%",top:"15%",width:"15%",height:"45%",background:"rgba(255,255,255,0.3)",borderRadius:1}}/>
                          </div>
                        </div>
                      )}
                      {!wine&&assignMode && <span style={{color:"#6a4a00",fontSize:14}}>+</span>}
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
          <div style={{height:4,background:"linear-gradient(to bottom,#9a6028,#7a5018)",borderRadius:2}}/>
        </div>
      </div>
      <div style={{display:"flex",marginTop:2,paddingLeft:20}}>
        {Array.from({length:sec.cols}).map((_,c)=>(
          <div key={c} style={{width:CELL,flexShrink:0,textAlign:"center",fontSize:8,color:"#5a3800"}}>{c+1}</div>
        ))}
      </div>
    </div>
  );

  const renderMap = () => (
    <div style={{flex:1,overflowY:"auto",padding:"10px 12px"}}>
      <div style={{display:"flex",alignItems:"center",marginBottom:10}}>
        <span style={{fontSize:10,color:"#9a6a4a"}}>{occupiedCells}/{totalCells} positions · {totalCells-occupiedCells} libres</span>
        {assignMode && (
          <button onClick={()=>setAssignMode(null)}
            style={{marginLeft:"auto",padding:"4px 12px",borderRadius:11,background:"#e8a060",border:"none",color:"#1a0a00",cursor:"pointer",fontSize:11,fontWeight:"bold"}}>
            ✓ Fin placement
          </button>
        )}
      </div>
      {SECTIONS.map(sec=>renderSection(sec))}
      {selectedCell && !assignMode && (() => {
        const wid=positions[selectedCell];
        const wine=wid?wines.find(w=>w.id===wid):null;
        const parts=selectedCell.split("-");
        const sec=SECTIONS.find(s=>s.id===parts[0]);
        return (
          <div style={{background:"#2a1500",border:"1px solid #8b3a00",borderRadius:10,padding:"11px 13px",marginTop:6}}>
            <div style={{fontSize:11,color:"#9a6a4a",marginBottom:5}}>
              📍 {sec?.label} · Rangée {Number(parts[1])+1} · Col. {Number(parts[2])+1}
            </div>
            {wine ? (
              <>
                <div style={{fontWeight:"bold",fontSize:15}}>{WINE_COLORS[wine.type]} {wine.nom}</div>
                <div style={{color:"#c4916a",fontSize:13,marginTop:2}}>{wine.appellation} · {wine.millesime}</div>
                <div style={{display:"flex",gap:8,marginTop:10}}>
                  <button onClick={()=>{ const p={...positions}; delete p[selectedCell]; updatePositions(p); setSelectedCell(null); }}
                    style={{flex:1,padding:"6px",borderRadius:8,background:"#3a1500",border:"1px solid #7a3a00",color:"#c47a6a",cursor:"pointer",fontSize:12}}>🗑️ Retirer</button>
                  <button onClick={()=>{ setAssignMode(wine.id); setSelectedCell(null); }}
                    style={{flex:1,padding:"6px",borderRadius:8,background:"#3a1500",border:"1px solid #5a2a00",color:"#c4916a",cursor:"pointer",fontSize:12}}>🔄 Changer</button>
                </div>
              </>
            ) : (
              <>
                <div style={{color:"#9a6a4a",fontSize:13,marginBottom:7}}>Case vide — choisir un vin :</div>
                <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:150,overflowY:"auto"}}>
                  {wines.map(w=>(
                    <button key={w.id} onClick={()=>{ updatePositions({...positions,[selectedCell]:w.id}); setSelectedCell(null); }}
                      style={{padding:"5px 10px",borderRadius:8,background:"#3a1500",border:"1px solid #5a2a00",color:"#f5e6c8",cursor:"pointer",fontSize:12,textAlign:"left"}}>
                      {WINE_COLORS[w.type]} {w.nom} {w.millesime}
                    </button>
                  ))}
                  {wines.length===0 && <div style={{fontSize:12,color:"#5a3a00"}}>Ajoutez d'abord des vins dans Ma Cave</div>}
                </div>
              </>
            )}
          </div>
        );
      })()}
      {assignMode && (
        <div style={{background:"#2a1800",border:"1px solid #e8a060",borderRadius:10,padding:"9px 13px",marginTop:6}}>
          <div style={{fontSize:13,color:"#e8a060",marginBottom:2}}>
            Placement : <strong>{(wines.find(w=>w.id===assignMode)||{}).nom}</strong>
          </div>
          <div style={{fontSize:11,color:"#9a6a4a"}}>{(winePositionMap[assignMode]||[]).length} position(s) · Cliquez les cases</div>
        </div>
      )}
      <div style={{marginTop:14,display:"flex",gap:10,flexWrap:"wrap",paddingBottom:20}}>
        {Object.entries(TYPE_COLOR).map(([t,c])=>(
          <div key={t} style={{display:"flex",alignItems:"center",gap:3,fontSize:10,color:"#9a6a4a"}}>
            <div style={{width:8,height:13,background:c,borderRadius:2}}/>{t}
          </div>
        ))}
        <div style={{display:"flex",alignItems:"center",gap:3,fontSize:10,color:"#9a6a4a"}}>
          <div style={{width:8,height:13,background:"#180c00",border:"1px solid #3a2000",borderRadius:2}}/>vide
        </div>
      </div>
    </div>
  );

  const renderSettings = () => (
    <div style={{flex:1,overflowY:"auto",padding:18}}>
      <div style={{fontSize:15,fontWeight:"bold",marginBottom:18}}>⚙️ Réglages</div>
      <div style={{background:"#2a1500",border:"1px solid #5a2a00",borderRadius:10,padding:14,marginBottom:14}}>
        <div style={{fontSize:13,color:"#e8a060",fontWeight:"bold",marginBottom:6}}>☁️ Google Sheets</div>
        <div style={{fontSize:11,color:"#9a6a4a",lineHeight:1.6,marginBottom:10}}>
          Votre cave est sauvegardée automatiquement et accessible sur tous vos appareils.
          {lastSync && <div style={{marginTop:6,color:"#6a8a6a"}}>Dernière sync : {lastSync.toLocaleTimeString()}</div>}
        </div>
        <button onClick={manualSync} disabled={syncing}
          style={{width:"100%",padding:"10px",borderRadius:8,background:syncing?"#3a1500":"#2a4a2a",border:"1px solid #3a6a3a",color:syncing?"#9a6a4a":"#8aaa8a",cursor:syncing?"not-allowed":"pointer",fontSize:13}}>
          {syncing?"⏳ Synchronisation…":"🔄 Synchroniser maintenant"}
        </button>
      </div>
      <div style={{background:"#2a1500",border:"1px solid #5a2a00",borderRadius:10,padding:14}}>
        <div style={{fontSize:13,color:"#e8a060",fontWeight:"bold",marginBottom:6}}>📲 Installer comme app</div>
        <div style={{fontSize:11,color:"#9a6a4a",lineHeight:1.7}}>
          <strong style={{color:"#c4916a"}}>iPhone (Safari) :</strong><br/>
          Partager → "Sur l'écran d'accueil"<br/><br/>
          <strong style={{color:"#c4916a"}}>PC (Chrome) :</strong><br/>
          Icône ⊕ dans la barre d'adresse → "Installer"
        </div>
      </div>
    </div>
  );

  return (
    <div style={{fontFamily:"Georgia,serif",background:"#1a0a00",minHeight:"100vh",color:"#f5e6c8",display:"flex",flexDirection:"column",maxWidth:500,margin:"0 auto"}}>
      {toast && (
        <div style={{position:"fixed",top:14,left:"50%",transform:"translateX(-50%)",background:toast.color,color:"#fff",padding:"8px 18px",borderRadius:20,fontSize:13,zIndex:999,boxShadow:"0 2px 12px #0006",whiteSpace:"nowrap"}}>
          {toast.msg}
        </div>
      )}
      <div style={{background:"linear-gradient(135deg,#3d0a00,#6b1a00)",padding:"12px 16px",borderBottom:"1px solid #8b3a00"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{fontSize:18,fontWeight:"bold",letterSpacing:1}}>🍷 Mon Caviste</div>
          {syncing && <div style={{fontSize:10,color:"#c4916a"}}>⏳ Sync…</div>}
        </div>
        <div style={{fontSize:10,color:"#c4916a",marginTop:2}}>
          {wines.length} vins · {totalBottles} bouteilles · {occupiedCells}/{totalCells} positions · ☁️ Google Sheets
        </div>
      </div>
      <div style={{display:"flex",background:"#2a0e00",borderBottom:"1px solid #5a2a00"}}>
        {[["map","🗺️ Plan"],["chat","💬 Sommelier"],["cellar","🗄️ Cave"],["add",editId!==null?"✏️ Modifier":"➕ Ajouter"],["settings","⚙️"]].map(([id,label])=>(
          <button key={id} onClick={()=>{ setView(id); if(id!=="add") setEditId(null); }}
            style={{flex:1,padding:"9px 2px",background:view===id?"#6b1a00":"transparent",color:view===id?"#f5e6c8":"#9a6a4a",border:"none",cursor:"pointer",fontSize:10,borderBottom:view===id?"2px solid #e8a060":"2px solid transparent"}}>
            {label}
          </button>
        ))}
      </div>

      {view==="map" && renderMap()}

      {view==="chat" && (
        <div style={{flex:1,display:"flex",flexDirection:"column"}}>
          <div style={{flex:1,overflowY:"auto",padding:14,display:"flex",flexDirection:"column",gap:10,minHeight:350}}>
            {messages.map((m,i)=>(
              <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                <div style={{maxWidth:"82%",padding:"9px 13px",borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",background:m.role==="user"?"#6b1a00":"#2a1500",border:m.role==="assistant"?"1px solid #5a2a00":"none",fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap"}}>
                  {m.role==="assistant" && <span style={{fontSize:10,color:"#c4916a",display:"block",marginBottom:3}}>🍷 Sommelier</span>}
                  {m.content}
                </div>
              </div>
            ))}
            {loading && (
              <div style={{display:"flex"}}>
                <div style={{padding:"9px 13px",borderRadius:"18px 18px 18px 4px",background:"#2a1500",border:"1px solid #5a2a00",fontSize:13,color:"#c4916a"}}>✦ En réflexion…</div>
              </div>
            )}
            <div ref={messagesEnd}/>
          </div>
          <div style={{padding:10,borderTop:"1px solid #3a1500",display:"flex",gap:7}}>
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendMessage()}
              placeholder="Ex: Quel vin avec un agneau rôti ?"
              style={{flex:1,padding:"9px 13px",borderRadius:22,background:"#2a1500",border:"1px solid #5a2a00",color:"#f5e6c8",fontSize:13,outline:"none"}}/>
            <button onClick={sendMessage} disabled={loading||!input.trim()}
              style={{padding:"9px 15px",borderRadius:22,background:loading?"#3a1500":"#8b2a00",border:"none",color:"#f5e6c8",cursor:"pointer",fontSize:15}}>➤</button>
          </div>
          <div style={{padding:"0 10px 10px",display:"flex",gap:5,flexWrap:"wrap"}}>
            {["Accord poisson","Quand ouvrir ?","Comment servir ?","Meilleur rouge ?"].map(q=>(
              <button key={q} onClick={()=>setInput(q)}
                style={{padding:"4px 9px",borderRadius:11,background:"#2a1500",border:"1px solid #5a2a00",color:"#c4916a",fontSize:11,cursor:"pointer"}}>{q}</button>
            ))}
          </div>
        </div>
      )}

      {view==="cellar" && (
        <div style={{flex:1,overflowY:"auto",padding:14}}>
          {wines.length===0 ? (
            <div style={{textAlign:"center",color:"#9a6a4a",marginTop:60}}>
              <div style={{fontSize:44}}>🍾</div>
              <div style={{marginTop:10}}>Cave vide — ajoutez vos bouteilles !</div>
            </div>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:9}}>
              {wines.map(w=>{
                const cells=winePositionMap[w.id]||[];
                const isAssigning=assignMode===w.id;
                return (
                  <div key={w.id} style={{background:"#2a1500",border:`1px solid ${isAssigning?"#e8a060":"#5a2a00"}`,borderRadius:11,padding:"11px 13px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:"bold",fontSize:14}}>{WINE_COLORS[w.type]} {w.nom}</div>
                        <div style={{color:"#c4916a",fontSize:12,marginTop:2}}>{w.appellation} · {w.millesime}</div>
                        <div style={{color:"#9a6a4a",fontSize:11,marginTop:3}}>
                          🍾 {w.quantite} btl{w.quantite>1?"s":""}
                          {cells.length>0 && <span style={{color:"#8b6a30",marginLeft:6}}>· 📍 {cells.length}</span>}
                        </div>
                      </div>
                      <div style={{display:"flex",gap:4,flexDirection:"column",alignItems:"flex-end"}}>
                        <div style={{display:"flex",gap:4}}>
                          <button onClick={()=>startEdit(w)} style={{background:"#3a1500",border:"1px solid #5a2a00",color:"#c4916a",padding:"3px 8px",borderRadius:7,cursor:"pointer",fontSize:12}}>✏️</button>
                          <button onClick={()=>deleteWine(w.id)} style={{background:"#3a1500",border:"1px solid #5a2a00",color:"#c47a6a",padding:"3px 8px",borderRadius:7,cursor:"pointer",fontSize:12}}>🗑️</button>
                        </div>
                        <button onClick={()=>{ setAssignMode(isAssigning?null:w.id); setView("map"); }}
                          style={{background:isAssigning?"#7a4a00":"#3a1500",border:`1px solid ${isAssigning?"#e8a060":"#5a2a00"}`,color:isAssigning?"#f5e6c8":"#c4916a",padding:"3px 8px",borderRadius:7,cursor:"pointer",fontSize:11}}>
                          📍 Placer
                        </button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {view==="add" && (
        <div style={{flex:1,overflowY:"auto",padding:18}}>
          <div style={{fontSize:15,fontWeight:"bold",marginBottom:18}}>{editId?"Modifier le vin":"Ajouter un vin"}</div>
          {[
            {label:"Nom du vin *",key:"nom",ph:"Ex: Château Margaux"},
            {label:"Appellation / Région",key:"appellation",ph:"Ex: Margaux, Bourgogne…"},
            {label:"Millésime",key:"millesime",ph:"Ex: 2018"},
          ].map(f=>(
            <div key={f.key} style={{marginBottom:13}}>
              <label style={{fontSize:12,color:"#c4916a",display:"block",marginBottom:4}}>{f.label}</label>
              <input value={newWine[f.key]} onChange={e=>setNewWine(p=>({...p,[f.key]:e.target.value}))}
                placeholder={f.ph}
                style={{width:"100%",padding:"9px 11px",borderRadius:8,background:"#2a1500",border:"1px solid #5a2a00",color:"#f5e6c8",fontSize:13,outline:"none"}}/>
            </div>
          ))}
          <div style={{marginBottom:13}}>
            <label style={{fontSize:12,color:"#c4916a",display:"block",marginBottom:4}}>Type</label>
            <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
              {Object.entries(WINE_COLORS).map(([type,emoji])=>(
                <button key={type} onClick={()=>setNewWine(p=>({...p,type}))}
                  style={{padding:"5px 12px",borderRadius:18,border:`1px solid ${newWine.type===type?"#e8a060":"#5a2a00"}`,background:newWine.type===type?"#6b1a00":"#2a1500",color:"#f5e6c8",cursor:"pointer",fontSize:12,textTransform:"capitalize"}}>
                  {emoji} {type}
                </button>
              ))}
            </div>
          </div>
          <div style={{marginBottom:18}}>
            <label style={{fontSize:12,color:"#c4916a",display:"block",marginBottom:4}}>Quantité</label>
            <div style={{display:"flex",alignItems:"center",gap:11}}>
              <button onClick={()=>setNewWine(p=>({...p,quantite:Math.max(1,p.quantite-1)}))} style={{width:36,height:36,borderRadius:"50%",background:"#2a1500",border:"1px solid #5a2a00",color:"#f5e6c8",fontSize:20,cursor:"pointer"}}>−</button>
              <span style={{fontSize:17,minWidth:28,textAlign:"center"}}>{newWine.quantite}</span>
              <button onClick={()=>setNewWine(p=>({...p,quantite:p.quantite+1}))} style={{width:36,height:36,borderRadius:"50%",background:"#2a1500",border:"1px solid #5a2a00",color:"#f5e6c8",fontSize:20,cursor:"pointer"}}>+</button>
            </div>
          </div>
          <button onClick={addOrUpdateWine} disabled={!newWine.nom.trim()}
            style={{width:"100%",padding:"12px",borderRadius:9,background:newWine.nom.trim()?"#8b2a00":"#3a1500",border:"none",color:"#f5e6c8",fontSize:14,cursor:newWine.nom.trim()?"pointer":"not-allowed"}}>
            {editId?"💾 Enregistrer":"🍾 Ajouter à ma cave"}
          </button>
        </div>
      )}

      {view==="settings" && renderSettings()}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
